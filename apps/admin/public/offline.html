<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>Нет подключения</title>
    <style>
      :root {
        color-scheme: light;
        --background: #f7f8fa;
        --foreground: #0f172a;
        --card: #ffffff;
        --muted-foreground: #64748b;
        --border: #dce3ec;
        --primary: #0f172a;
        --primary-foreground: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: radial-gradient(circle at top, #eef3fa 0%, #f7f8fa 40%, #f7f8fa 100%);
        color: var(--foreground);
        font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif;
      }

      main {
        width: min(100%, 420px);
        padding: 32px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--card);
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.5rem;
        line-height: 1.2;
      }

      p {
        margin: 0;
        line-height: 1.5;
      }

      p + p {
        margin-top: 8px;
        color: var(--muted-foreground);
      }

      .actions {
        margin-top: 24px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 40px;
        padding: 0 16px;
        border-radius: 10px;
        background: var(--primary);
        color: var(--primary-foreground);
        font-weight: 600;
        text-decoration: none;
      }

      a:focus-visible,
      a:hover {
        opacity: 0.92;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 data-i18n="title">Нет подключения</h1>
      <p data-i18n="description">Приложение сейчас офлайн. Проверьте подключение к интернету и попробуйте снова.</p>
      <div class="actions">
        <a href="." data-i18n="retry" onclick="window.location.reload(); return false;">Повторить</a>
      </div>
    </main>
    <script>
      (function () {
        var STORAGE_KEY = 'project-kit.locale';
        var DEFAULT_LOCALE = 'ru';
        var dictionaries = {
          ru: {
            title: 'Нет подключения',
            description: 'Приложение сейчас офлайн. Проверьте подключение к интернету и попробуйте снова.',
            retry: 'Повторить'
          },
          en: {
            title: 'You are offline',
            description: 'The app is currently offline. Check your internet connection and try again.',
            retry: 'Retry'
          }
        };

        function normalizeLocale(value) {
          if (!value || typeof value !== 'string') {
            return DEFAULT_LOCALE;
          }

          var normalized = value.toLowerCase();
          if (normalized.indexOf('en') === 0) {
            return 'en';
          }
          if (normalized.indexOf('ru') === 0) {
            return 'ru';
          }
          return DEFAULT_LOCALE;
        }

        function readStoredLocale() {
          try {
            return window.localStorage ? window.localStorage.getItem(STORAGE_KEY) : null;
          } catch (error) {
            void error;
            return null;
          }
        }

        var params = new URLSearchParams(window.location.search);
        var locale = normalizeLocale(
          params.get('lang') ||
            readStoredLocale() ||
            document.documentElement.lang ||
            (window.navigator && window.navigator.language)
        );
        var messages = dictionaries[locale] || dictionaries[DEFAULT_LOCALE];

        document.documentElement.lang = locale;
        document.title = messages.title;

        Array.prototype.forEach.call(document.querySelectorAll('[data-i18n]'), function (node) {
          var key = node.getAttribute('data-i18n');
          if (key && messages[key]) {
            node.textContent = messages[key];
          }
        });
      })();
    </script>
  </body>
</html>
